[algokit]
min_version = "v2.0.0"

[project]
type = 'contract'
name = 'community_donation_hub'
artifacts = 'smart_contracts/artifacts'

[project.deploy]
command = "poetry run python -m smart_contracts deploy"

[project.run]
build = { commands = ['poetry run python -m smart_contracts build'], description = 'Build' }
